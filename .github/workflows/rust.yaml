name: Rust check and testing

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cargo-target: ""
          - os: macos-latest
            cargo-target: ""
          - os: windows-latest
            cargo-target: --target x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Configure R env for extendr
        run: |
          R_HOME="$(R RHOME)"
          echo "R_HOME=$R_HOME" >> "$GITHUB_ENV"
          echo "R_INCLUDE_DIR=$R_HOME/include" >> "$GITHUB_ENV"
          R --version
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Windows GNU Rust target
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -- --check
        shell: bash
        working-directory: src/rust

      - name: Build (debug)
        run: cargo build --all-features ${{ matrix.cargo-target }}
        shell: bash
        working-directory: src/rust

      - name: Run unit tests
        run: cargo test --all-features ${{ matrix.cargo-target }}
        shell: bash
        working-directory: src/rust

      - name: Build (release)
        run: cargo build --release --all-features ${{ matrix.cargo-target }}
        shell: bash
        working-directory: src/rust
