name: R install check (remotes)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  install-from-github:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      INSTALL_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
      INSTALL_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout exact commit under test
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INSTALL_REPO }}
          ref: ${{ env.INSTALL_REF }}
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install remotes
        shell: Rscript {0}
        run: install.packages("remotes", repos = "https://cloud.r-project.org")

      - name: Install tynding from GitHub at exact commit
        shell: Rscript {0}
        run: |
          remotes::install_github(
            paste0(Sys.getenv("INSTALL_REPO"), "@", Sys.getenv("INSTALL_REF")),
            upgrade = "never",
            dependencies = TRUE
          )

      - name: Verify tynding loads
        shell: Rscript {0}
        run: |
          library(tynding)
          packageVersion("tynding")
